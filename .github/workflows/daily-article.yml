name: Daily AI Article

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate & add article
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python3 scripts/generate_article.py
      
      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          node --check articles.js
          git config user.name "ainav-bot"
          git config user.email "bot@ainav.local"
          git add articles.js
          git diff --cached --quiet || (
            git commit -m "auto: $(date +%Y-%m-%d)"
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
            git push
          )
