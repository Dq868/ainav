name: Daily AI Article

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Generate article
        run: |
          curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "User-Agent: ainav-bot" \
            -d '{"model":"gpt-4o-mini","messages":[{"role":"system","content":"写一篇AI工具原创文章，只输出JSON"},{"role":"user","content":"写一篇AI工具相关的原创实用文章，不要写已有主题：ChatGPT vs Claude vs Gemini、AI代码助手对比、免费AI工具推荐"}],"temperature":0.8,"max_tokens":4096}' > /tmp/r.json
          
      - name: Parse JSON
        run: |
          python3 << 'PYEOF'
import json
with open('/tmp/r.json') as f:
    data = json.load(f)
content = data['choices'][0]['message']['content'].strip()
if content.startswith('```'):
    content = content.split('\n', 1)[1].rsplit('```', 1)[0].strip()
with open('/tmp/a.json', 'w') as f:
    f.write(content)
print("OK: article parsed")
PYEOF
          
      - name: Add article to site
        run: |
          cat /tmp/a.json | python3 scripts/add_article.py
          
      - name: Push to GitHub
        run: |
          node --check articles.js
          git config user.name "ainav-bot"
          git config user.email "bot@ainav.local"
          git add articles.js
          git diff --cached --quiet || (git commit -m "auto: $(date +%Y-%m-%d)" && git push)
