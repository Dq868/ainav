<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<title>酱肘AI — 文章</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e6e8ec;
    --text: #1a1d26;
    --text-secondary: #6b7280;
    --primary: #4f6cf7;
    --primary-light: #eef1ff;
    --primary-dark: #3b55d6;
    --radius: 12px;
    --radius-sm: 8px;
    --max-w: 800px;
    --header-h: 64px;
  }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.8;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h); display: flex; align-items: center;
  }
  header .inner {
    max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
    width: 100%; display: flex; align-items: center; gap: 12px;
  }
  .back-link {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-secondary); font-size: .9rem; font-weight: 500;
    text-decoration: none; padding: 6px 12px; border-radius: var(--radius-sm);
    transition: background .15s, color .15s;
  }
  .back-link:hover { background: var(--primary-light); color: var(--primary); }

  .container { max-width: var(--max-w); margin: 0 auto; padding: 32px 24px 60px; }

  .loading-state, .error-state {
    text-align: center; padding: 80px 20px; color: var(--text-secondary);
  }
  .loading-state .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .article-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px 44px;
  }
  .article-content .icon-wrap {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--primary-light); display: flex; align-items: center;
    justify-content: center; font-size: 2rem; margin-bottom: 16px;
  }
  .article-content h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .article-meta {
    color: var(--text-secondary); font-size: .85rem; margin-bottom: 24px;
    display: flex; gap: 16px; align-items: center;
  }
  .article-content h2 {
    font-size: 1.2rem; font-weight: 600; margin: 32px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .article-content h3 {
    font-size: 1.05rem; font-weight: 600; margin: 24px 0 8px;
  }
  .article-content p { margin-bottom: 16px; color: var(--text); }
  .article-content table {
    width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .9rem;
  }
  .article-content th, .article-content td {
    padding: 10px 14px; border: 1px solid var(--border); text-align: left;
  }
  .article-content th { background: var(--bg); font-weight: 600; }

  .related-section {
    margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);
  }
  .related-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
  .related-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
  }
  .related-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px; cursor: pointer; text-decoration: none;
    color: inherit; display: block; transition: box-shadow .2s;
  }
  .related-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .related-card .r-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--primary-light);
    display: flex; align-items: center; justify-content: center; font-size: 1rem; margin-bottom: 6px;
  }
  .related-card .r-name { font-weight: 600; font-size: .88rem; }
  .related-card .r-desc { font-size: .78rem; color: var(--text-secondary); }

  footer {
    text-align: center; padding: 32px 24px; border-top: 1px solid var(--border);
    color: var(--text-secondary); font-size: .82rem;
  }
  footer a { color: var(--primary); text-decoration: none; }

  .article-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    margin-top: 20px;
  }
  .article-list-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; cursor: pointer; text-decoration: none;
    color: inherit; display: block; transition: box-shadow .2s, transform .15s;
  }
  .article-list-item:hover {
    box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px);
  }
  .article-list-item .ali-icon { font-size: 2rem; margin-bottom: 10px; }
  .article-list-item h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
  .article-list-item p { font-size: .85rem; color: var(--text-secondary); }
  .article-list-item .ali-meta {
    font-size: .78rem; color: var(--ad-label); margin-top: 8px;
  }
  .page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .page-sub { color: var(--text-secondary); font-size: .9rem; margin-bottom: 20px; }

  @media (max-width: 640px) {
    .article-content { padding: 24px 20px; }
    .article-content table { font-size: .78rem; }
    .article-content th, .article-content td { padding: 6px 8px; }
  }
</style>

</head>
<body>

<header>
  <div class="inner">
    <a class="back-link" href="/" id="backBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </a>
  </div>
</header>

<div class="container">
  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <span>加载中...</span>
  </div>
  <div id="error" class="error-state" style="display:none;">
    <div class="emoji" style="font-size:3rem;margin-bottom:12px;">🔍</div>
    <h2>未找到该文章</h2>
    <a href="/" class="back-link" style="display:inline-flex;margin-top:12px;">返回首页</a>
  </div>
  <div id="content" style="display:none;"></div>
</div>

<footer>© 2026 酱肘AI &mdash; <a href="/">发现最好的 AI 工具</a> &nbsp;·&nbsp; <a href="/about">关于我们</a></footer>

<script src="/tools.js"></script>
<script src="/articles.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  let articleId = params.get('id');
  if (!articleId) {
    const m = window.location.pathname.match(/\/blog\/([^/]+)/);
    if (m) articleId = m[1];
  }

  if (!articleId) {
    // Show article list
    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';
    const articles = getAllArticles();
    document.title = '酱肘AI — 文章';
    setMeta('description', 'AI 工具对比、评测、使用技巧，帮你选对工具用对方法。');
    content.innerHTML = `
      <div class="page-title">📝 AI 工具文章</div>
      <div class="page-sub">对比评测、使用技巧、效率方法</div>
      <div class="article-list">
        ${articles.map(a => `
          <a class="article-list-item" href="/blog/${a.id}">
            <div class="ali-icon">${a.icon}</div>
            <h3>${a.title}</h3>
            <p>${a.summary}</p>
            <div class="ali-meta">${a.date}</div>
          </a>
        `).join('')}
      </div>
    `;
    return;
  }

  const article = getArticleById(articleId);
  if (!article) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }

  // SEO
  document.title = article.title + ' — 酱肘AI';
  setMeta('description', article.summary);
  setMeta('og:title', article.title);
  setMeta('og:description', article.summary);
  setMeta('og:url', window.location.href);

  // Related tools
  const relatedTools = (article.relatedTools || [])
    .map(id => getToolById(id))
    .filter(Boolean)
    .slice(0, 4);

  const relatedHtml = relatedTools.length > 0 ? `
    <div class="related-section">
      <h3>🔗 相关工具</h3>
      <div class="related-grid">
        ${relatedTools.map(t => `
          <a class="related-card" href="/tool/${t.id}">
            <div class="r-icon">${t.icon}</div>
            <div class="r-name">${t.name}</div>
            <div class="r-desc">${t.desc}</div>
          </a>
        `).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('content').innerHTML = `
    <div class="article-content">
      <div class="icon-wrap">${article.icon}</div>
      <h1>${article.title}</h1>
      <div class="article-meta">
        <span>📅 ${article.date}</span>
        <span>📂 ${CATEGORIES.find(c => c.id === article.cat)?.label || ''}</span>
      </div>
      ${article.content}
      ${relatedHtml}
    </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  function setMeta(name, content) {
    let el = document.querySelector('meta[name="' + name + '"], meta[property="' + name + '"]');
    if (!el) {
      el = document.createElement('meta');
      if (name.startsWith('og:')) el.setAttribute('property', name);
      else el.setAttribute('name', name);
      document.head.appendChild(el);
    }
    el.setAttribute('content', content);
  }
})();
</script>
</body>
</html>
