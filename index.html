<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e6e8ec;
    --text: #1a1d26;
    --text-secondary: #6b7280;
    --primary: #4f6cf7;
    --primary-light: #eef1ff;
    --primary-dark: #3b55d6;
    --ad-label: #9ca3af;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,.08);
    --radius: 12px;
    --radius-sm: 8px;
    --max-w: 1280px;
    --header-h: 64px;
  }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center;
  }
  header .inner {
    max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
    width: 100%; display: flex; align-items: center; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; white-space: nowrap; }
  .logo svg { flex-shrink: 0; }
  .search-wrap {
    flex: 1; max-width: 480px; position: relative; margin: 0 auto 0 24px;
  }
  .search-wrap input {
    width: 100%; padding: 8px 16px 8px 40px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--bg); font-size: .9rem; outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,108,247,.15);
  }
  .search-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-secondary); pointer-events: none;
  }
  .header-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .btn-submit {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 18px; border-radius: 999px; font-size: .85rem;
    background: var(--primary); color: #fff; font-weight: 500;
    transition: background .2s; border: none; cursor: pointer;
  }
  .btn-submit:hover { background: var(--primary-dark); }

  /* ===== Layout ===== */
  .container { max-width: var(--max-w); margin: 0 auto; padding: 24px 24px 60px; display: flex; gap: 32px; }

  /* ===== Sidebar ===== */
  aside { width: 220px; flex-shrink: 0; position: sticky; top: calc(var(--header-h) + 24px); align-self: start; }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: .9rem; color: var(--text-secondary); cursor: pointer;
    transition: background .15s, color .15s; font-weight: 500;
  }
  .cat-item:hover { background: var(--primary-light); color: var(--primary); }
  .cat-item.active { background: var(--primary); color: #fff; }
  .cat-item .badge {
    margin-left: auto; font-size: .75rem; background: var(--border);
    padding: 1px 8px; border-radius: 999px; color: var(--text-secondary);
  }
  .cat-item.active .badge { background: rgba(255,255,255,.2); color: #fff; }

  /* ===== Main ===== */
  main { flex: 1; min-width: 0; }

  /* ===== Ads ===== */
  .ad-banner {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 16px 24px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 28px; min-height: 72px;
    color: var(--ad-label); font-size: .8rem;
  }
  .ad-banner .ad-icon { font-size: 1.5rem; opacity: .4; }

  /* ===== Section ===== */
  .section-title {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-sub { color: var(--text-secondary); font-size: .88rem; margin-bottom: 20px; }
  .section-sub .count { font-weight: 600; color: var(--primary); }

  /* ===== Grid ===== */
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 40px; }

  .tool-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: box-shadow .2s, transform .2s, border-color .2s;
    cursor: pointer; position: relative; display: flex; flex-direction: column;
  }
  .tool-card:hover {
    box-shadow: var(--shadow-hover); transform: translateY(-2px);
    border-color: var(--primary);
  }
  .tool-card .icon-wrap {
    width: 44px; height: 44px; border-radius: var(--radius-sm);
    background: var(--primary-light); display: flex; align-items: center;
    justify-content: center; font-size: 1.3rem; margin-bottom: 12px;
  }
  .tool-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .tool-card p {
    font-size: .84rem; color: var(--text-secondary); line-height: 1.55;
    flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tool-card .tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .tool-card .tag {
    font-size: .72rem; padding: 2px 10px; border-radius: 999px;
    background: var(--bg); color: var(--text-secondary);
  }
  .tool-card .tag.free { background: #e0f2e9; color: #0b7a4a; }
  .tool-card .tag.paid { background: #fef3e2; color: #b45a0c; }
  .tool-card .tag.freemium { background: #e8edff; color: #4f6cf7; }
  .tool-card .go-link {
    position: absolute; inset: 0; z-index: 1;
    /* transparent clickable overlay */
    /* actual link hidden inside for accessibility */
  }
  .tool-card .go-link a {
    position: absolute; inset: 0; opacity: 0; z-index: 2;
  }

  /* ===== Side Ad ===== */
  .ad-side {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 32px 20px; text-align: center;
    color: var(--ad-label); font-size: .8rem; margin-top: 12px;
    min-height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
  }
  .ad-side .ad-icon { font-size: 2rem; opacity: .3; }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-secondary);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

  /* ===== Footer ===== */
  footer {
    text-align: center; padding: 32px 24px; border-top: 1px solid var(--border);
    color: var(--text-secondary); font-size: .82rem;
  }
  footer a { color: var(--primary); }

  /* ===== Mobile ===== */
  .mobile-cat-bar { display: none; }
  @media (max-width: 820px) {
    aside { display: none; }
    .container { padding: 16px 16px 40px; gap: 0; }
    .search-wrap { margin: 0; max-width: none; }
    .search-wrap input { padding: 8px 14px 8px 38px; }
    .header-actions .btn-submit span { display: none; }
    .mobile-cat-bar {
      display: flex; gap: 8px; overflow-x: auto; padding: 0 0 16px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .mobile-cat-bar::-webkit-scrollbar { display: none; }
    .mobile-cat-item {
      flex-shrink: 0; padding: 8px 16px; border-radius: 999px;
      font-size: .82rem; background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: .15s; white-space: nowrap;
    }
    .mobile-cat-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tool-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .ad-side { display: none; }
    .ad-banner { min-height: 60px; padding: 12px 16px; }
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>

// ========== 渲染 ==========
function buildPage(filterCat = 'all', search = '') {
  const catListEl = document.getElementById('categoryList');
  const mobileBar = document.getElementById('mobileCategoryBar');
  const sectionsEl = document.getElementById('categorySections');
  const emptyState = document.getElementById('emptyState');

  // Build category list
  catListEl.innerHTML = CATEGORIES.map(c => `
    <div class="cat-item${filterCat === c.id ? ' active' : ''}" data-cat="${c.id}">
      <span>${c.label}</span>
      <span class="badge">${c.id === 'all' ? TOOLS.length : TOOLS.filter(t => t.cat === c.id).length}</span>
    </div>
  `).join('');

  mobileBar.innerHTML = CATEGORIES.map(c => `
    <div class="mobile-cat-item${filterCat === c.id ? ' active' : ''}" data-cat="${c.id}">${c.label}</div>
  `).join('');

  // Filter
  const filtered = TOOLS.filter(t => {
    if (filterCat !== 'all' && t.cat !== filterCat) return false;
    if (search) {
      const q = search.toLowerCase();
      return t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tg => tg.includes(q));
    }
    return true;
  });

  // Group by category for "all" view
  if (filterCat === 'all') {
    let html = '';
    // In "all" view, only show categories that have visible tools
    const catsWithTools = CATEGORIES.slice(1).filter(c => {
      return TOOLS.some(t => t.cat === c.id && filtered.includes(t));
    });
    if (catsWithTools.length === 0) {
      emptyState.style.display = 'block';
      sectionsEl.innerHTML = '';
      return;
    }
    emptyState.style.display = 'none';
    catsWithTools.forEach(c => {
      const items = TOOLS.filter(t => t.cat === c.id && filtered.includes(t));
      html += renderSection(c, items);
    });
    sectionsEl.innerHTML = html;
  } else {
    if (filtered.length === 0) {
      emptyState.style.display = 'block';
      sectionsEl.innerHTML = '';
      return;
    }
    emptyState.style.display = 'none';
    const cat = CATEGORIES.find(c => c.id === filterCat);
    sectionsEl.innerHTML = renderSection(cat, filtered);
  }

  // Category click handlers
  document.querySelectorAll('.cat-item, .mobile-cat-item').forEach(el => {
    el.addEventListener('click', () => {
      const cat = el.dataset.cat;
      document.getElementById('searchInput').value = '';
      buildPage(cat, '');
      // Scroll main into view on mobile
      if (window.innerWidth <= 820) {
        document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Tool card click to open URL (placeholder for demo)
  document.querySelectorAll('.tool-card').forEach(card => {
    card.addEventListener('click', (e) => {
      // If the actual link inside was clicked, let it propagate
      if (e.target.closest('a')) return;
      const link = card.querySelector('a');
      if (link && link.href && link.href !== '#') {
        window.open(link.href, '_blank');
      } else {
        // demo: show tool info
        const name = card.querySelector('h3').textContent;
        alert(`即将跳转到「${name}」官网\n（演示模式，实际部署后替换为真实链接）`);
      }
    });
  });
}

function renderSection(cat, items) {
  if (!items || items.length === 0) return '';
  return `
    <div class="section" data-cat="${cat.id}">
      <div class="section-title">${cat.label}</div>
      <div class="section-sub">共 <span class="count">${items.length}</span> 个工具</div>
      <div class="tool-grid">
        ${items.map(t => renderCard(t)).join('')}
      </div>
    </div>
  `;
}

function renderCard(tool) {
  const priceTag = tool.tags.find(t => ['free','paid','freemium'].includes(t)) || 'freemium';
  const otherTags = tool.tags.filter(t => !['free','paid','freemium','热门','开源'].includes(t));
  const extraTags = tool.tags.filter(t => ['热门','开源'].includes(t));
  const displayTags = [...new Set([priceTag, ...extraTags, ...otherTags])];
  return `
    <div class="tool-card">
      <div class="go-link"><a href="#" target="_blank" rel="noopener"></a></div>
      <div class="icon-wrap">${tool.icon}</div>
      <h3>${tool.name}</h3>
      <p>${tool.desc}</p>
      <div class="tags">
        ${displayTags.map(t => `<span class="tag ${t}">${t === 'free' ? '免费' : t === 'paid' ? '付费' : t === 'freemium' ? '免费增值' : t === '热门' ? '🔥 热门' : t === '开源' ? '📂 开源' : t}</span>`).join('')}
      </div>
    </div>
  `;
}

// ========== 搜索 ==========
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  updatePlan(q);
});

let searchTimer = null;
function updatePlan(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    // Find currently active category
    const activeCat = document.querySelector('.cat-item.active')?.dataset.cat || 'all';
    buildPage(activeCat, q);
  }, 200);
}

// ========== Init ==========
buildPage('all', '');
</script>
