<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 工具导航 — 发现最好的 AI 工具，覆盖聊天、图像、代码、视频、音频、办公等分类。">
  <meta name="google-site-verification" content="Wsq4c3zO5bibhXAw6kxO56XsaFS0xb9nKduMqGakfOY" />
<title>AI 工具导航 — 发现最好的 AI 工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e6e8ec;
    --text: #1a1d26;
    --text-secondary: #6b7280;
    --primary: #4f6cf7;
    --primary-light: #eef1ff;
    --primary-dark: #3b55d6;
    --ad-label: #9ca3af;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,.08);
    --radius: 12px;
    --radius-sm: 8px;
    --max-w: 1280px;
    --header-h: 64px;
  }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center;
  }
  header .inner {
    max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
    width: 100%; display: flex; align-items: center; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; white-space: nowrap; }
  .logo svg { flex-shrink: 0; }
  .search-wrap { flex: 1; max-width: 480px; position: relative; margin: 0 auto 0 24px; }
  .search-wrap input {
    width: 100%; padding: 8px 16px 8px 40px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--bg); font-size: .9rem; outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,108,247,.15);
  }
  .search-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-secondary); pointer-events: none;
  }
  .header-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .btn-submit {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 18px; border-radius: 999px; font-size: .85rem;
    background: var(--primary); color: #fff; font-weight: 500;
    transition: background .2s; border: none; cursor: pointer;
  }
  .btn-submit:hover { background: var(--primary-dark); }

  /* ===== Layout ===== */
  .container { max-width: var(--max-w); margin: 0 auto; padding: 24px 24px 60px; display: flex; gap: 32px; }

  /* ===== Sidebar ===== */
  aside { width: 220px; flex-shrink: 0; position: sticky; top: calc(var(--header-h) + 24px); align-self: start; }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: .9rem; color: var(--text-secondary); cursor: pointer;
    transition: background .15s, color .15s; font-weight: 500;
  }
  .cat-item:hover { background: var(--primary-light); color: var(--primary); }
  .cat-item.active { background: var(--primary); color: #fff; }
  .cat-item .badge {
    margin-left: auto; font-size: .75rem; background: var(--border);
    padding: 1px 8px; border-radius: 999px; color: var(--text-secondary);
  }
  .cat-item.active .badge { background: rgba(255,255,255,.2); color: #fff; }

  /* Sort bar */
  .sort-bar {
    display: flex; align-items: center; gap: 8px; padding: 12px 0 16px;
  }
  .sort-btn {
    padding: 5px 14px; border-radius: 999px; font-size: .8rem;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: .15s; color: var(--text-secondary);
  }
  .sort-btn:hover { border-color: var(--primary); color: var(--primary); }
  .sort-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ===== Main ===== */
  main { flex: 1; min-width: 0; }

  /* ===== Ads ===== */
  .ad-banner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 24px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 28px; min-height: 72px;
    color: var(--ad-label); font-size: .82rem; cursor: pointer;
    transition: box-shadow .2s;
  }
  .ad-banner:hover { box-shadow: var(--shadow-hover); }
  .ad-banner .ad-icon { font-size: 1.5rem; opacity: .5; }

  .ad-side {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px 20px; text-align: center;
    color: var(--ad-label); font-size: .8rem; margin-top: 16px;
    min-height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; transition: box-shadow .2s;
  }
  .ad-side:hover { box-shadow: var(--shadow-hover); }
  .ad-side .ad-icon { font-size: 2rem; opacity: .3; }

  /* ===== Section ===== */
  .section-title {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-sub { color: var(--text-secondary); font-size: .88rem; margin-bottom: 20px; }
  .section-sub .count { font-weight: 600; color: var(--primary); }

  /* ===== Grid ===== */
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 40px; }

  .tool-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: box-shadow .2s, transform .2s, border-color .2s;
    cursor: pointer; display: flex; flex-direction: column;
    position: relative;
  }
  .tool-card:hover {
    box-shadow: var(--shadow-hover); transform: translateY(-2px);
    border-color: var(--primary);
  }
  .tool-card .icon-wrap {
    width: 44px; height: 44px; border-radius: var(--radius-sm);
    background: var(--primary-light); display: flex; align-items: center;
    justify-content: center; font-size: 1.3rem; margin-bottom: 12px;
  }
  .tool-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .tool-card p {
    font-size: .84rem; color: var(--text-secondary); line-height: 1.55;
    flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tool-card .tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .tool-card .tag {
    font-size: .72rem; padding: 2px 10px; border-radius: 999px;
    background: var(--bg); color: var(--text-secondary);
  }
  .tool-card .tag.free { background: #e0f2e9; color: #0b7a4a; }
  .tool-card .tag.paid { background: #fef3e2; color: #b45a0c; }
  .tool-card .tag.freemium { background: #e8edff; color: #4f6cf7; }
  .tool-card .tag.hot { background: #fef0ec; color: #d13b3b; }
  .tool-card .tag.oss { background: #ede9fe; color: #6d28d9; }

  /* ===== Empty ===== */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-secondary);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.3); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 32px; width: 100%; max-width: 520px; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15);
  }
  .modal h2 { font-size: 1.2rem; margin-bottom: 4px; }
  .modal .modal-sub { color: var(--text-secondary); font-size: .88rem; margin-bottom: 20px; }
  .modal .close-btn {
    float: right; border: none; background: none;
    font-size: 1.4rem; cursor: pointer; color: var(--text-secondary);
    padding: 4px; line-height: 1;
  }
  .modal .close-btn:hover { color: var(--text); }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: .85rem; font-weight: 500; margin-bottom: 6px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: .9rem; outline: none;
    background: var(--bg); transition: border .2s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--primary);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 9px 20px; border-radius: 999px; font-size: .88rem;
    border: 1px solid var(--border); background: var(--surface); cursor: pointer;
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-primary {
    padding: 9px 24px; border-radius: 999px; font-size: .88rem;
    background: var(--primary); color: #fff; border: none; cursor: pointer;
    font-weight: 500; transition: background .2s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    z-index: 300; background: #1a1d26; color: #fff;
    padding: 12px 24px; border-radius: 999px; font-size: .88rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    opacity: 0; transition: opacity .3s, transform .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Mobile ===== */
  .mobile-cat-bar { display: none; }
  @media (max-width: 820px) {
    aside { display: none; }
    .container { padding: 16px 16px 40px; gap: 0; }
    .search-wrap { margin: 0; max-width: none; }
    .search-wrap input { padding: 8px 14px 8px 38px; }
    .header-actions .btn-submit span { display: none; }
    .mobile-cat-bar {
      display: flex; gap: 8px; overflow-x: auto; padding: 0 0 12px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .mobile-cat-bar::-webkit-scrollbar { display: none; }
    .mobile-cat-item {
      flex-shrink: 0; padding: 8px 16px; border-radius: 999px;
      font-size: .82rem; background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: .15s; white-space: nowrap;
    }
    .mobile-cat-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tool-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
    .ad-side { display: none; }
    .ad-banner { min-height: 60px; padding: 12px 16px; }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#4f6cf7"/>
        <path d="M8 10l6 4-6 4V10z" fill="#fff" opacity=".9"/>
        <path d="M14 10l6 4-6 4V10z" fill="#fff"/>
      </svg>
      AI 导航
    </div>
    <div class="search-wrap">
      <span class="icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="搜索 AI 工具..." autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-submit" id="openSubmitBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>提交工具</span>
      </button>
    </div>
  </div>
</header>

<div class="container">

  <!-- Sidebar -->
  <aside>
    <nav class="cat-list" id="categoryList"></nav>
    <div class="ad-side" onclick="window.open('https://replicate.com','_blank')">
      <div class="ad-icon">🤖</div>
      <div style="font-weight:500;color:var(--text);margin-bottom:4px;">Replicate</div>
      <div>云端运行 5000+ AI 模型</div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="ad-banner" onclick="window.open('https://vercel.com','_blank')">
      <span class="ad-icon">⚡</span>
      <span>Vercel — 全球领先的前端部署平台 | 本站由 Vercel 强力驱动</span>
    </div>

    <div class="mobile-cat-bar" id="mobileCategoryBar"></div>

    <!-- Sort bar -->
    <div class="sort-bar">
      <span style="font-size:.85rem;color:var(--text-secondary);font-weight:500;">排序：</span>
      <button class="sort-btn active" data-sort="default">默认</button>
      <button class="sort-btn" data-sort="name">名称</button>
      <button class="sort-btn" data-sort="newest">最新</button>
    </div>

    <div id="categorySections"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="emoji">🔍</div>
      <h3>未找到相关工具</h3>
      <p>试试其他关键词或分类</p>
    </div>
  </main>
</div>

<footer>
  © 2026 AI 导航 &mdash; 发现最好的 AI 工具 &nbsp;·&nbsp; <a href="#" id="openSubmitLink" style="color:var(--primary);">提交工具</a>
</footer>

<!-- Submit Modal -->
<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <button class="close-btn" id="closeModalBtn">&times;</button>
    <h2>📮 提交 AI 工具</h2>
    <p class="modal-sub">推荐你觉得好用的 AI 工具，审核后会展示在导航中</p>
    <form id="submitForm">
      <div class="form-group">
        <label>工具名称 *</label>
        <input type="text" id="fieldName" placeholder="例如：ChatGPT" required>
      </div>
      <div class="form-group">
        <label>官网地址 *</label>
        <input type="url" id="fieldUrl" placeholder="https://example.com" required>
      </div>
      <div class="form-group">
        <label>分类 *</label>
        <select id="fieldCat" required>
          <option value="">请选择分类</option>
          <option value="chat">💬 聊天对话</option>
          <option value="image">🎨 图像生成</option>
          <option value="code">💻 代码开发</option>
          <option value="video">🎬 视频创作</option>
          <option value="audio">🎵 音频处理</option>
          <option value="office">📋 办公效率</option>
          <option value="search">🔍 搜索知识</option>
          <option value="other">🧩 其他工具</option>
        </select>
      </div>
      <div class="form-group">
        <label>简短介绍 *</label>
        <textarea id="fieldDesc" placeholder="一句话描述这个工具..." required></textarea>
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="fieldTags" placeholder="免费, 热门, 开源">
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn-primary">提交</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="tools.js"></script>
<script>
(function() {
  // ========== State ==========
  let currentCategory = 'all';
  let currentSearch = '';
  let currentSort = 'default';

  // ========== Render ==========
  function buildPage() {
    const catListEl = document.getElementById('categoryList');
    const mobileBar = document.getElementById('mobileCategoryBar');
    const sectionsEl = document.getElementById('categorySections');
    const emptyState = document.getElementById('emptyState');

    // Build category list
    catListEl.innerHTML = CATEGORIES.map(c => {
      const count = c.id === 'all' ? TOOLS.length : TOOLS.filter(t => t.cat === c.id).length;
      return `<div class="cat-item${currentCategory === c.id ? ' active' : ''}" data-cat="${c.id}">
        <span>${c.label}</span>
        <span class="badge">${count}</span>
      </div>`;
    }).join('');

    mobileBar.innerHTML = CATEGORIES.map(c =>
      `<div class="mobile-cat-item${currentCategory === c.id ? ' active' : ''}" data-cat="${c.id}">${c.label}</div>`
    ).join('');

    // Filter
    let allTools = getAllTools();
    let filtered = allTools.filter(t => {
      if (currentCategory !== 'all' && t.cat !== currentCategory) return false;
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        return t.name.toLowerCase().includes(q)
            || t.desc.toLowerCase().includes(q)
            || (t.tags || []).some(tg => tg.includes(q));
      }
      return true;
    });

    // Sort
    const sorter = {
      'default': (a, b) => {
        const hotOrder = (x) => (x.tags||[]).includes('热门') ? 0 : 1;
        return hotOrder(a) - hotOrder(b) || a.name.localeCompare(b.name, 'zh');
      },
      'name': (a, b) => a.name.localeCompare(b.name, 'zh'),
      'newest': (a, b) => (b.id||'').localeCompare(a.id||''),
    };
    filtered.sort(sorter[currentSort] || sorter.default);

    // Group
    if (currentCategory === 'all') {
      let html = '';
      const catsWithTools = CATEGORIES.slice(1).filter(c =>
        filtered.some(t => t.cat === c.id)
      );
      if (catsWithTools.length === 0) {
        emptyState.style.display = 'block';
        sectionsEl.innerHTML = '';
        return;
      }
      emptyState.style.display = 'none';
      catsWithTools.forEach(c => {
        const items = filtered.filter(t => t.cat === c.id);
        html += renderSection(c, items);
      });
      sectionsEl.innerHTML = html;
    } else {
      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        sectionsEl.innerHTML = '';
        return;
      }
      emptyState.style.display = 'none';
      const cat = CATEGORIES.find(c => c.id === currentCategory);
      sectionsEl.innerHTML = renderSection(cat, filtered);
    }

    // Click handlers
    document.querySelectorAll('.cat-item, .mobile-cat-item').forEach(el => {
      el.addEventListener('click', () => {
        currentCategory = el.dataset.cat;
        buildPage();
        if (window.innerWidth <= 820) {
          document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  }

  function renderSection(cat, items) {
    if (!items || items.length === 0) return '';
    return `<div class="section" data-cat="${cat.id}">
      <div class="section-title">${cat.label}</div>
      <div class="section-sub">共 <span class="count">${items.length}</span> 个工具</div>
      <div class="tool-grid">
        ${items.map(t => renderCard(t)).join('')}
      </div>
    </div>`;
  }

  function renderCard(tool) {
    const priceTag = (tool.tags||[]).find(t => ['free','paid','freemium'].includes(t)) || 'freemium';
    const extras = (tool.tags||[]).filter(t => !['free','paid','freemium'].includes(t));
    const displayTags = [priceTag, ...extras];
    const tagLabels = { 'free': '免费', 'paid': '付费', 'freemium': '免费增值', '热门': '🔥 热门', '开源': '📂 开源' };
    const tagStyles = { 'free': 'free', 'paid': 'paid', 'freemium': 'freemium', '热门': 'hot', '开源': 'oss' };

    const detailUrl = window.location.protocol === 'file:'
      ? 'detail.html?tool=' + tool.id
      : '/tool/' + tool.id;

    return `<div class="tool-card" onclick="window.location.href='${detailUrl}'">
      <div class="icon-wrap">${tool.icon}</div>
      <h3>${tool.name}</h3>
      <p>${tool.desc}</p>
      <div class="tags">
        ${displayTags.map(t => `<span class="tag ${tagStyles[t] || ''}">${tagLabels[t] || t}</span>`).join('')}
      </div>
    </div>`;
  }

  // ========== Search ==========
  let searchTimer = null;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value.trim();
      buildPage();
    }, 200);
  });

  // ========== Sort ==========
  document.querySelector('.sort-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.sort-btn');
    if (!btn) return;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    buildPage();
  });

  // ========== Modal ==========
  const modal = document.getElementById('submitModal');
  const openBtns = [document.getElementById('openSubmitBtn'), document.getElementById('openSubmitLink')];
  const closeBtns = [
    document.getElementById('closeModalBtn'),
    document.getElementById('cancelModalBtn')
  ];

  function openModal() {
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }
  openBtns.forEach(b => b.addEventListener('click', (e) => { e.preventDefault(); openModal(); }));
  closeBtns.forEach(b => b.addEventListener('click', closeModal));
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  // Submit form
  document.getElementById('submitForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('fieldName').value.trim();
    const url = document.getElementById('fieldUrl').value.trim();
    const cat = document.getElementById('fieldCat').value;
    const desc = document.getElementById('fieldDesc').value.trim();
    const tagsStr = document.getElementById('fieldTags').value.trim();

    if (!name || !url || !cat || !desc) return;

    const tags = tagsStr ? tagsStr.split(/[,，]/).map(s => s.trim()).filter(Boolean) : ['free'];

    saveUserSubmission({
      name, url, cat, desc,
      tags: [...new Set(['free', ...tags])],
      icon: getCatIcon(cat)
    });

    closeModal();
    document.getElementById('submitForm').reset();
    showToast('✅ 提交成功！工具已添加到列表中');
    buildPage();
  });

  function getCatIcon(catId) {
    const icons = { chat: '💬', image: '🎨', code: '💻', video: '🎬', audio: '🎵', office: '📋', search: '🔍', other: '🧩' };
    return icons[catId] || '🧩';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ========== Init ==========
  buildPage();
})();
</script>
</body>
</html>
